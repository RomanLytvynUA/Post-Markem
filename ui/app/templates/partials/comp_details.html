<div class="divide-y divide-brand-dust/30 pb-2">
    {% for category in data %}
    <div id="cat-row-{{ category.id }}"
        class="py-4 flex flex-col md:flex-row md:items-center justify-between gap-4 hover:bg-brand-alabaster/30 px-2 -mx-2 rounded transition-colors group">

        <div class="flex items-center gap-2">
            <div class="font-medium text-brand-dark text-sm">
                {{ category.name }}
            </div>

            <div class="opacity-0 group-hover:opacity-100 transition-opacity flex gap-1">
                <button class="text-brand-slate hover:text-brand-blue" title="Edit Category"
                    onclick="document.getElementById('item_modal_title').innerText='Edit Category'; document.getElementById('item_name').value='{{ category.name }}'; document.getElementById('item_api_url').value='/api/categories/{{ category.id }}'; document.getElementById('item_method').value='PUT'; document.getElementById('item_modal').showModal();">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor" class="w-3.5 h-3.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                    </svg>
                </button>
                <button class="text-brand-slate hover:text-red-600" title="Delete Category"
                    hx-delete="/api/categories/{{ category.id }}" hx-target="#cat-row-{{ category.id }}"
                    hx-swap="outerHTML" hx-confirm="Delete this category?">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor" class="w-3.5 h-3.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-2">
            {% for round in category.rounds %}
            <div id="round-btn-{{ round.id }}" class="relative group/btn">
                {% if 'final' in round.type|lower and 'semi' not in round.type|lower and 'quarter' not in
                round.type|lower %}
                <a href="/analyze/{{ round.id }}" class="btn btn-xs btn-primary text-white font-mono font-bold pr-6">
                    {{ round.type }}
                </a>
                {% else %}
                <a href="/analyze/{{ round.id }}"
                    class="btn btn-xs btn-outline border-brand-dust text-brand-dark hover:bg-brand-alabaster hover:border-brand-slate font-mono font-normal pr-6">
                    {{ round.type }}
                </a>
                {% endif %}

                <button
                    class="absolute right-1 top-1/2 -translate-y-1/2 opacity-0 group-hover/btn:opacity-100 text-red-500 bg-white/10 rounded-full"
                    hx-delete="/api/rounds/{{ round.id }}" hx-target="#round-btn-{{ round.id }}" hx-swap="outerHTML"
                    hx-confirm="Delete this round?">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-3.5 h-3.5">
                        <path
                            d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
                    </svg>
                </button>
            </div>
            {% endfor %}

            <button
                class="btn btn-xs btn-ghost border border-dashed border-brand-slate text-brand-slate hover:border-brand-blue hover:text-brand-blue font-mono font-normal"
                onclick="document.getElementById('item_modal_title').innerText='Add Round'; document.getElementById('item_name').value=''; document.getElementById('item_api_url').value='/api/categories/{{ category.id }}/rounds'; document.getElementById('item_method').value='POST'; document.getElementById('item_modal').showModal();">
                + Round
            </button>
        </div>

    </div>
    {% endfor %}

    <div class="pt-3">
        <button
            class="btn btn-sm btn-ghost w-full border border-dashed border-brand-dust text-brand-slate hover:border-brand-blue hover:text-brand-blue hover:bg-transparent"
            onclick="document.getElementById('item_modal_title').innerText='Add Category'; document.getElementById('item_name').value=''; document.getElementById('item_api_url').value='/api/events/{{ comp_id }}/categories'; document.getElementById('item_method').value='POST'; document.getElementById('item_modal').showModal();">
            + Add New Category
        </button>
    </div>
</div>
